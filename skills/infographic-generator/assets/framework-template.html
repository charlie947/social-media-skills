<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            width: 1200px;
            height: 1400px;
            margin: 0;
            padding: 40px;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 56px;
            font-weight: 700;
            color: #4285f4;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 20px;
            color: #5f6368;
            font-weight: 400;
        }

        .framework-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            flex: 1;
        }

        .framework-item {
            background: #ffffff;
            border: 3px solid #4285f4;
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .item-icon {
            width: 80px;
            height: 80px;
            background: #e8f0fe;
            border: 2px solid #4285f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
        }

        .item-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 15px;
        }

        .item-description {
            font-size: 18px;
            color: #5f6368;
            line-height: 1.6;
            text-align: center;
        }

        .key-points {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e8f0fe;
        }

        .key-point {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .key-point::before {
            content: "→";
            color: #4285f4;
            font-size: 20px;
            font-weight: 700;
            margin-right: 10px;
            min-width: 20px;
        }

        .key-point span {
            font-size: 16px;
            color: #5f6368;
            line-height: 1.5;
        }

        .footer {
            background: #e8f0fe;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-top: 30px;
        }

        .footer-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        .footer-text {
            font-size: 18px;
            color: #5f6368;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="main-title">{{TITLE}}</div>
            <div class="subtitle">{{SUBTITLE}}</div>
        </div>

        <div class="framework-grid">
            {{FRAMEWORK_ITEMS}}
        </div>

        <div class="footer">
            <div class="footer-title">{{FOOTER_TITLE}}</div>
            <div class="footer-text">{{FOOTER_TEXT}}</div>
        </div>
    </div>
</body>
</html>
