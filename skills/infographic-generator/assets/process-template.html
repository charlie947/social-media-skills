<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            width: 1200px;
            height: 1400px;
            margin: 0;
            padding: 40px;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .main-title {
            font-size: 56px;
            font-weight: 700;
            color: #4285f4;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 20px;
            color: #5f6368;
            font-weight: 400;
        }

        .process-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .step {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border: 3px solid #4285f4;
            border-radius: 15px;
            padding: 30px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
        }

        .step-number {
            min-width: 80px;
            height: 80px;
            background: #4285f4;
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .step-description {
            font-size: 18px;
            color: #5f6368;
            line-height: 1.5;
        }

        .arrow {
            width: 60px;
            height: 60px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #4285f4;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            padding: 25px;
            background: #e8f0fe;
            border-radius: 10px;
        }

        .footer-note p {
            font-size: 18px;
            color: #5f6368;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="main-title">{{TITLE}}</div>
            <div class="subtitle">{{SUBTITLE}}</div>
        </div>

        <div class="process-container">
            {{STEPS}}
        </div>

        <div class="footer-note">
            <p>{{FOOTER_NOTE}}</p>
        </div>
    </div>
</body>
</html>
